about:
  title: "Tentang Saya"
  description: |
    Sebagai developer pemula dan programmer independen, saya membangun fondasi kuat di ranah pengembangan game dengan mengeksplorasi ragam ide, mekanik game, serta pengalaman pemain yang mendalam. Saya mahir dalam menggunakan logika berbasis web dengan PHP dan menggunakan GDScript sebagai bahasa utama untuk membangun game pixel impian menggunakan Godot Engine.

    Menjadi pengembang independen berarti bekerja sendiri sepenuhnya—mulai dari konsep desain, penulisan kode sumber, hingga tahap iterasi serta debugging. Pendekatan seorang developer intuitif menegaskan perlunya belajar secara berkelanjutan, bereksperimen dari aspek teknis, hingga menyulam prinsip interaksi yang nyaman ke dalam dunia game demi terciptanya sebuah rekam jejak yang solid.
