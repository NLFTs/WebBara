faq:
  title: Pertanyaan yang Sering Diajukan
  description: Temukan jawaban umum seputar penawaran, proses di balik layar, serta keseharian saya.
  categories:
    - title: Layanan & Proses
      questions:
        - label: Layanan apa yang Anda tawarkan?
          content: |
            Saya berspesialisasi dalam merancang game pixel, merakit desain antarmuka, hingga memproduksi skrip permainan mandiri lewat Godot dan PHP.
        - label: Seperti apa proses pengerjaan Anda?
          content: |
            Sebagai seorang developer intuitif, saya selalu melibatkan iterasi kolaboratif mulai dari tahap pencarian inspirasi, pemetaan desain prototipe visual, hingga kolaborasi intens kala pengerjaan final pada kode arsitektur.
        - label: Apakah Anda bekerja sama dengan Perusahaan Startup?
          content: |
            Pastinya! Menyusun dan membayangkan struktur dasar game pixel inovatif sejalan dengan idealisme banyak anak muda yang giat berkarya.
    - title: Harga & Waktu
      questions:
        - label: Berapa taksiran biayanya?
          content: |
            Secara esensial bergantung terhadap ruang lingkup permainan, rumitnya level desain serta tenggat waktu pelaksanaan. Konsultasikan dengan saya lebih lanjut untuk penawaran mendetail.
        - label: Bagaimana sistem pembayarannya?
          content: |
            Untuk jadwal peluncuran game pixel maupun portofolio yang matang, uang muka sebesar 40% menjadi tiket dimulainya eksplorasi sketsa bersama. Sisa pembayaran dilakukan pasca penyelesaian karya.
        - label: Butuh waktu berapa lama?
          content: |
            Skala kecil biasanya memakan waktu sekitaran 3 hingga 4 minggu lamanya. Fitur interaktif kompleks mungkin memakan paruh waktu peluncuran yang berbeda.
        - label: Apakah ada jaminan komitmen atau perawatan purnajual?
          content: |
            Ada, baik bagi yang membutuhkan asistensi arsitektur konten, adaptasi web mandiri, hingga pengawalan pemeliharaan server permainan. Tentu saja, kontrak retain bulanan akan kami rumuskan sesuai tingkat kemendesakan dan kebutuhan fungsionalitasnya.
    - title: Tentang Saya
      questions:
        - label: Hal apa yang amat dinikmati selama ini?
          content: |
            Membedah permasalahan kompleks hingga menemukan kemurnian jawaban tersembunyinya. Sebuah hadiah luar biasa bagi saya melihat orang-orang berhasil merasuk lalu nyaman menggunakan solusi digital buatan saya. Menjembatani jurang tajam antara angan-angan ke target spesifik di tengah keterbatasan teknologi. Itulah antusiasme yang saya senandungkan dari hari ke hari demi membangkitkan game pixel luar biasa!
        - label: Adakah hobi lain jika Anda tidak sedang menyusun serangkaian baris kode?
          content: |
            Hanya asyik merenung, memantau *streaming* daring dan sejenak bermain video game berlayar temaram di pojokan ruang.
